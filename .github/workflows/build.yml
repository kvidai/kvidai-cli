name: Build

on:
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Skills index up-to-date
        run: bun run skills:index:check

      - name: Build
        run: bun build --compile --minify --bytecode --target=bun-linux-x64 src/index.ts --outfile dist/kvidai
