name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0, 0.2.0-alpha.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip creating GitHub release)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: kvidai
            platform: linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: kvidai
            platform: linux-arm64
            os: ubuntu-24.04-arm
          - target: bun-darwin-arm64
            artifact: kvidai
            platform: darwin-arm64
            os: macos-latest
          - target: bun-windows-x64
            artifact: kvidai.exe
            platform: windows-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version info
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(echo "${GITHUB_REF_NAME}" | sed 's/^v//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match release version (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build binary
        shell: bash
        run: |
          bun run scripts/gen-version.ts
          bun build --compile --minify --bytecode \
            --target=${{ matrix.target }} \
            src/index.ts \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Extract release info
        id: release-info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION=$(echo "$TAG" | sed 's/^v//')
          fi

          # Detect pre-release versions (e.g. 0.2.0-alpha.0, 1.0.0-beta.1)
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Rename artifacts for release
        run: |
          mkdir -p release
          cp dist/linux-x64/kvidai release/kvidai-linux-x64
          cp dist/linux-arm64/kvidai release/kvidai-linux-arm64
          cp dist/darwin-arm64/kvidai release/kvidai-darwin-arm64
          cp dist/windows-x64/kvidai.exe release/kvidai-windows-x64.exe

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.tag }}
          prerelease: ${{ steps.release-info.outputs.prerelease }}
          generate_release_notes: true
          files: release/*
